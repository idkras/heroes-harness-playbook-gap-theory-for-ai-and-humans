# harness-workflow.yaml — ЕДИНЫЙ SSOT харнесса (жизненный цикл + состав проектного слоя).
#
# Зачем: единый источник правды о том, ЧТО происходит после клона, КАК харнесс
# сам себя ставит, КАК он остаётся работоспособным пока toolchain не встал, и КАК
# ведутся проекты (projects/ symlink Kanban + оркестратор). На этот файл ссылается
# scripts/harness_bootstrap.py (вердикт getting_started) и projects/README.md.
#
# Один SSOT, без дублей: wiring-проекция хуков — harness-manifest.json (derived,
# verify_harness_wiring.py); состав/распределение — здесь. Нет второго *workflow*ssot*.yaml.

version: 1
project: mike-harness-template

# ─────────────────────────────────────────────────────────────────────────────
getting_started:
  intent: >
    Новый пользователь делает `git clone` и открывает репо в Claude Code / Codex.
    Дальше — НИЧЕГО руками. Харнесс сам активирует обвязку и доустанавливает
    инструментарий, печатая чеклист в чат. Если открыто не в агенте — одна команда.

  manual_entrypoint: "bash scripts/setup/install_all.sh"   # idempotent; --check для read-only
  onboarding_doc: "docs/GETTING_STARTED.md"
  rca_why_not_auto_before: "docs/why-harness-not-installed-5-whys.md"

  session_start_chain:            # порядок хуков на SessionStart (см. .claude/settings.json)
    - step: bootstrap
      run: "python3 $CLAUDE_PROJECT_DIR/scripts/harness_bootstrap.py"
      does:
        - chmod +x хукам и скриптам
        - портабилизация абсолютных путей → $CLAUDE_PROJECT_DIR
        - "toolchain: marker-guarded авто-запуск install_all.sh (один раз после клона)"
        - "verify: checksum-манифест (полнота+целостность) + harness wiring (gaps==0)"
        - печать чеклиста getting-started PASS/WARN/FAIL
      blocking: false             # best-effort, exit 0 — не ломает сессию
    - step: bd_prime
      run: "command -v bd >/dev/null 2>&1 && bd prime --hook-json || true"
      does: ["контекст beads-воркфлоу в сессию"]
      guard: "no-op пока bd не установлен — SessionStart не падает"

# ─────────────────────────────────────────────────────────────────────────────
toolchain:                        # что ставит install_all.sh (idempotent)
  required:
    - {name: python-venv, provides: ".venv + requirements.txt (pytest, PyYAML, networkx)"}
    - {name: bd,   provides: "beads — задачник (AI-native issue tracker)"}
    - {name: dolt, provides: "Dolt DB — движок под beads ('DAC DB' на слух)"}
    - {name: bd-init, provides: ".beads/ (или резолв workspace через 'bd list')"}
    - {name: graphify, provides: "scripts/graphify.py (networkx) → graphify-out/graph.json — граф задач(beads)+процесса(этот файл)"}
  verify: "bash scripts/setup/install_all.sh --check   # exit!=0 если неполно"
  graphify:
    build:  "python3 scripts/graphify.py"
    doctor: "python3 scripts/graphify.py --doctor"
    source: ["beads (bd list / bd graph --all --dot)", "harness-workflow.yaml"]
    output: "graphify-out/graph.json (gitignored, node-link networkx)"

# ─────────────────────────────────────────────────────────────────────────────
graceful_degradation:             # ИНВАРИАНТ: харнесс работает, пока toolchain не встал
  principle: >
    После синка с git и ДО полной установки харнесс остаётся рабочим. Ни один
    хук не должен жёстко блокировать пользователя из-за отсутствия bd/Dolt/deps.
  guarantees:
    - "core хуки/скрипты — stdlib-only: работают без .venv и без сторонних пакетов"
    - "bd-зависимые PreToolUse-гейты fail-open: нет bd → return 0 (не exit 2)"
    - "first_substantial_write_branch_bead_gate: при отказе 'bd list' читает .beads/issues.jsonl (коммитится в репо)"
    - "все гейты ловят исключения и fail-open (turn не ломается)"
    - "bd prime на SessionStart guard'нут 'command -v bd' — no-op без bd"
    - "toolchain incomplete → шаг WARN (не FAIL): вердикт не краснеет, в DETAIL точная команда"
  bd_dependent_hooks:             # все проверены на fail-open
    - .claude/hooks/first_substantial_write_branch_bead_gate.py  # + jsonl fallback
    - .claude/hooks/branch_name_bead_ref_check.py
    - .claude/hooks/userprompt_branch_bead_nudge.py
    - .claude/hooks/bd_anti_legend_gate.py
    - .claude/hooks/pr_bead_jtbd_ref_check.py

# ─────────────────────────────────────────────────────────────────────────────
change_lifecycle:                 # бизнес-процесс правки (принуждается хуками)
  - bd create --title="JTBD: Когда <ситуация>, хотим <результат>" --type=task
  - python3 scripts/make_worktree.py <bead-id> --claim   # свой worktree+ветка
  - "{project}.todo.md — критическая цепочка (скил 1-critical-chain-status-report)"
  - правки в worktree (PreToolUse-гейты следят за чистотой и структурой)
  - "quality gates: pytest / валидаторы скилов / checksum --verify"
  - merge ветки → main (скил 5-land-to-main-mechanical)
  - bd close <id> + (по профилю прав) git push / bd dolt push

profiles:                         # права агента (CLAUDE.md)
  conservative: "по умолчанию — не коммитит/пушит сам, отчитывается и ждёт"
  team_maintainer: "opt-in — закрывает beads, гоняет гейты, коммитит, пушит"

# ─────────────────────────────────────────────────────────────────────────────
# PROJECT MANAGEMENT — projects/ symlink Kanban. Owner 2026-06-20: «папка projects/
# в корне; all-projects + симлинки в 5 НУМЕРОВАННЫХ lane по статусу; проект один-к-
# одному с Bits Ticket (bead=JTBD) и worktree; вести проекты по оркестратору».
project_management:
  root: projects/
  master_dir: projects/all-projects     # каждый проект физически живёт здесь один раз
  lanes:                                # ровно один симлинк ../all-projects/<name> на проект; папки НУМЕРОВАНЫ
    - { id: backlog,         folder: "projects/1. backlog",         bead: "open (backlog/next)" }
    - { id: dod-n-blocked,   folder: "projects/2. dod-n-blocked",   bead: "dod_blocked label / blocked status (override)" }
    - { id: in-progress,     folder: "projects/3. in-progress",     bead: "in_progress (in_design/in_review/rework)" }
    - { id: to-delivery,     folder: "projects/4. to-delivery",     bead: "delivering/owner_received" }
    - { id: verify-and-done, folder: "projects/5. verify-and-done", bead: "closed (override) / outcome_realized" }
  naming_chain: "JTBD title → bead pr-rick-<id> (Bits Ticket) → branch/worktree pr-rick-<slug>-<id> → project folder == branch basename → PR"
  skill:          .agents/skills/1-project-create-launch         # SKILL.md + workflow.yaml + lanes.json + scripts/ + tests/
  lifecycle_ssot: .agents/skills/1-project-create-launch/workflow.yaml   # P1–P7+B стадии + переходы симлинков
  mapping_ssot:   .agents/skills/1-project-create-launch/lanes.json      # bead status/labels → lane
  mover:          .agents/skills/1-project-create-launch/scripts/project_status_symlinks.py  # init/new/move/sync/sync-all/link/board/doctor
  install_REQUIRED:                     # выполнить при установке харнесса
    scaffold: "python3 .agents/skills/1-project-create-launch/scripts/project_status_symlinks.py init  (all-projects + 5 нумерованных lane; идемпотентно)"
    run_by_orchestrator: "КАЖДЫЙ проект ведётся через skill 19-orchestrator-pipeline (12 стадий + self-falsification/QA/design гейты); lane = текущая стадия"
    verify: "project_status_symlinks.py doctor → exit 0 (нет orphan/broken/wrong-target/drift/multi-lane)"

# LOCAL-ONLY — beads + dolt: per-install, НЕ часть состава, НЕ коммитится, НЕ едет в mirror.
# Owner 2026-06-20: «beads и dolt инициализируются локально; партнёры и клиенты не тянут это».
local_only:
  beads_dolt:
    paths: [".beads/", ".dolt/"]
    rule: "gitignored; каждый owner/partner/client делает `bd init` сам (toolchain.required.bd-init); публичный template не отгружает bead-БД/dolt-историю"
    checksum: "EXCLUDE_PARTS{.beads,.dolt} — не checksummed"
    degradation: "нет .beads → bd-зависимые гейты fail-open (см. graceful_degradation)"

# ─────────────────────────────────────────────────────────────────────────────
skills_index:                     # куда смотреть
  install_and_onboarding: ["docs/GETTING_STARTED.md", "scripts/setup/install_all.sh"]
  task_tracking: ".agents/skills/1-change-task-and-project-state-via-beads"
  project_lifecycle: ".agents/skills/1-project-create-launch"   # projects/ Kanban: create/move/sync проекты
  critical_chain: ".agents/skills/1-critical-chain-status-report"
  portability_and_harness: ".agents/skills/0-governance-harness-portability"
  land_to_main: ".agents/skills/5-land-to-main-mechanical"
